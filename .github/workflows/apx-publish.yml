# Reusable "publish API on change" workflow (Jira ARCH-271).
#
# A service repo consumes this from two tiny caller workflows (see
# docs/apx-publish.md): one on pull_request (mode: check — report drift, breaking,
# and path-reconciliation without blocking), one on push to the default branch
# (mode: publish — open a PR into the catalog + a drift issue when the API changed).
#
# The per-repo adoption surface is a single .apx-publish.yaml in the service repo.
# Bumping the ref this workflow is pinned at (or its default apx version) updates
# every consuming repo at once — no per-repo edit.
name: apx publish-on-change

on:
  workflow_call:
    inputs:
      mode:
        description: 'check (PR CI, report-only) or publish (on-merge, open PR + issue)'
        required: true
        type: string
      config:
        description: 'Per-repo config file'
        required: false
        type: string
        default: '.apx-publish.yaml'
      apx-version:
        description: 'apx version (advisory). The toolchain is now provisioned from the prebuilt ghcr.io/infobloxopen/apx-toolchain image, whose moving :v1 tag tracks the latest drift-capable apx; pin apx by using an image tag instead.'
        required: false
        type: string
        default: 'latest'
      apx-action-ref:
        description: 'Ref of infobloxopen/apx-action to load the publish script from (pin to the same ref you call this workflow at)'
        required: false
        type: string
        default: 'v1'
      go-version-file:
        description: 'Retained for compatibility; unused. The toolchain is prebuilt, and the FDS is emitted by the repo''s own (containerized) gentool, so no host Go toolchain is set up.'
        required: false
        type: string
        default: 'go.mod'
      breaking-gate:
        description: 'auto | advisory | blocking (auto = public blocks, internal advisory)'
        required: false
        type: string
        default: 'auto'
      verify-clients:
        description: 'apx client verify gate: fail (default) | warn | off. Generates an SDK from each converted spec and compiles it; fail stops the run when a client does not build. Requires the apx-toolchain image to provide `apx client verify` (see infobloxopen/apx#42).'
        required: false
        type: string
        default: 'fail'
      auto-merge:
        description: '(gitea sandbox only) merge the publish PR + finalize to demo the catalog updating'
        required: false
        type: boolean
        default: false
    secrets:
      # Least-privilege catalog "submit" GitHub App (forge: github). App needs
      # only contents:write + pull_requests:write + issues:write on the catalog
      # repo — NO tag-ruleset bypass, NO admin. Provide as org secrets in the
      # consuming repos' org so the workflow mints a short-lived scoped token.
      apx-app-id:
        required: false
      apx-app-private-key:
        required: false
      gitea-url:
        required: false
      gitea-org:
        required: false
      gitea-user:
        required: false
      gitea-password:
        required: false
      gitea-token:
        required: false

permissions:
  contents: read

jobs:
  apx-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout service repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Provision apx + its validator toolchain from the PREBUILT image instead of
      # installing/compiling it per run (npm install spectral, go install oasdiff/
      # protoc-gen-go, curl apx/buf). We lift the pinned binaries out of the image
      # and onto PATH rather than running the job inside `container:` — the FDS step
      # (`make <fds_target>`) shells out to the repo's own `docker run atlas-gentool`,
      # which needs the host Docker daemon; a container job would break that host
      # bind mount. This keeps the interface + behavior identical, just fast.
      - name: Provision apx toolchain (prebuilt image)
        env:
          TOOLCHAIN_IMAGE: ghcr.io/infobloxopen/apx-toolchain:v1
        run: |
          set -euo pipefail
          cid="$(docker create "$TOOLCHAIN_IMAGE")"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          dest="$HOME/.apx-toolchain/bin"
          mkdir -p "$dest"
          docker cp "$cid:/usr/local/bin/." "$dest/"
          echo "$dest" >> "$GITHUB_PATH"
          echo "Provisioned from $TOOLCHAIN_IMAGE:"
          for t in apx openapiv2to3 buf spectral oasdiff protoc-gen-go protoc-gen-go-grpc yq jq; do
            v="$("$dest/$t" --version 2>/dev/null | head -1 || echo present)"
            printf '  %-20s %s\n' "$t" "$v"
          done

      # The FileDescriptorSet the converter needs is a pure function of the repo's
      # committed protos + its pinned gentool. Cache it (never commit it) so the
      # slow step — the repo's own atlas-gentool `docker run`, invoked by
      # `make <fds_target>` in the publish script — runs only on a real proto change.
      - name: Resolve FileDescriptorSet cache inputs
        id: fds
        env:
          APX_CONFIG: ${{ inputs.config }}
        run: |
          set -euo pipefail
          # Paths the modules reference (repo-relative; may be scattered), emitted
          # as a multiline output for actions/cache to restore + save.
          {
            echo 'paths<<EOF'
            yq -r '.modules[].fds' "$APX_CONFIG" | sort -u
            echo EOF
          } >> "$GITHUB_OUTPUT"

          # Cache key = a content hash of EVERY file that determines the FDS bytes:
          #   1. all protos in the compile closure (repo-local imports included);
          #   2. the makefiles that pin the gentool image + the -I includes + flags.
          # Protos bundled INSIDE the gentool image (google/*, etc.) are versioned
          # by that pin, so hashing the makefile that carries it captures them too —
          # pin the image by @sha256 (not a floating tag) to make the pin immutable.
          # A repo whose gentool pin lives outside a Makefile* overrides the globs
          # via `fds_key_files:` in its config; the default covers make-driven repos.
          # Over-breadth is safe: an unrelated match only forces a needless regen
          # (a miss), never a stale hit.
          mapfile -t globs < <(yq -r '.fds_key_files[]?' "$APX_CONFIG")
          [[ ${#globs[@]} -gt 0 ]] || globs=('**/*.proto' '**/Makefile*')
          specs=(); for g in "${globs[@]}"; do specs+=(":(glob)$g"); done
          n=$(git ls-files -- "${specs[@]}" | wc -l)
          [[ "$n" -gt 0 ]] || { echo "no FDS key files matched: ${globs[*]}" >&2; exit 1; }
          key_hash=$(git ls-files -z -- "${specs[@]}" | sort -z \
            | xargs -0 sha256sum | sha256sum | cut -d' ' -f1)
          echo "FDS cache key covers $n file(s) via ${#globs[@]} glob(s): ${globs[*]}"
          git ls-files -- "${specs[@]}" | sed 's/^/  /'
          echo "key_hash=$key_hash" >> "$GITHUB_OUTPUT"

      - name: Cache FileDescriptorSet(s)
        uses: actions/cache@v4
        with:
          path: ${{ steps.fds.outputs.paths }}
          # Flips when any FDS input changes → regenerated exactly when it must be,
          # never stale. On a hit the publish script skips `make <fds_target>`
          # (no gentool, no Docker run).
          key: apx-fds-${{ runner.os }}-${{ steps.fds.outputs.key_hash }}

      - name: Load the publish script
        uses: actions/checkout@v5
        with:
          repository: infobloxopen/apx-action
          ref: ${{ inputs.apx-action-ref }}
          path: _apx_action

      - name: Read canonical repo from config
        id: cfg
        env:
          APX_CONFIG: ${{ inputs.config }}
        run: |
          set -euo pipefail
          repo="$(yq -r '.canonical_repo' "$APX_CONFIG")"
          echo "canonical_repo=$repo" >> "$GITHUB_OUTPUT"
          echo "forge=$(yq -r '.forge // "github"' "$APX_CONFIG")" >> "$GITHUB_OUTPUT"
          # Derive owner/name for the App-token installation scope (github forge).
          hp="${repo#http*://}"; hp="${hp%.git}"; hp="${hp#github.com/}"
          echo "canonical_owner=${hp%%/*}" >> "$GITHUB_OUTPUT"
          echo "canonical_name=${hp##*/}" >> "$GITHUB_OUTPUT"

      - name: Mint catalog submit-App token
        id: catalog-token
        if: steps.cfg.outputs.forge == 'github'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.apx-app-id }}
          private-key: ${{ secrets.apx-app-private-key }}
          owner: ${{ steps.cfg.outputs.canonical_owner }}
          repositories: ${{ steps.cfg.outputs.canonical_name }}

      - name: Clone canonical catalog
        env:
          GH_TOKEN: ${{ steps.catalog-token.outputs.token }}
          GITEA_TOKEN: ${{ secrets.gitea-token }}
          CANONICAL_REPO: ${{ steps.cfg.outputs.canonical_repo }}
          FORGE: ${{ steps.cfg.outputs.forge }}
        run: |
          set -euo pipefail
          # host/path only — the credential goes in a header, never in the URL argv.
          host_path="${CANONICAL_REPO#http*://}"; host_path="${host_path%.git}"
          if [[ "$FORGE" == "gitea" ]]; then
            git -c "http.extraHeader=Authorization: token ${GITEA_TOKEN}" \
              clone --quiet "http://${host_path}.git" .canonical
          else
            git clone --quiet "https://x-access-token:${GH_TOKEN}@github.com/${host_path#github.com/}.git" .canonical
          fi

      - name: Run apx publish-on-change
        env:
          GITHUB_TOKEN: ${{ steps.catalog-token.outputs.token }}
          GITEA_URL: ${{ secrets.gitea-url }}
          GITEA_ORG: ${{ secrets.gitea-org }}
          GITEA_TOKEN: ${{ secrets.gitea-token }}
          APX_MODE: ${{ inputs.mode }}
          APX_CONFIG: ${{ inputs.config }}
          APX_BREAKING_GATE: ${{ inputs.breaking-gate }}
          APX_VERIFY_CLIENTS: ${{ inputs.verify-clients }}
          APX_AUTO_MERGE: ${{ inputs.auto-merge }}
        run: |
          set -euo pipefail
          # `apx release submit` (publish mode) clones + pushes the canonical repo over
          # https with a plain `git clone` (no token injection). Configure the submit-App
          # token as a git credential for github.com so that private clone/push
          # authenticates — otherwise it fails with "could not read Username for
          # 'https://github.com'". The token is canonical-repo-scoped, so it is harmless
          # for any other host/repo git may touch.
          if [ -n "${GITHUB_TOKEN:-}" ]; then
            git config --global "http.https://github.com/.extraheader" \
              "AUTHORIZATION: Basic $(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
          fi
          # apx release submit commits the staged snapshot inside its temp clone; CI
          # runners have no default git identity, so set the submit-App bot identity
          # (otherwise submit fails with "empty ident name not allowed").
          git config --global user.name "apx-submit[bot]"
          git config --global user.email "apx-submit[bot]@users.noreply.github.com"
          chmod +x _apx_action/scripts/apx-publish.sh
          args=(--mode "$APX_MODE" --config "$APX_CONFIG" --canonical-dir .canonical --breaking-gate "$APX_BREAKING_GATE" --verify-clients "$APX_VERIFY_CLIENTS")
          [[ "$APX_AUTO_MERGE" == "true" ]] && args+=(--auto-merge)
          _apx_action/scripts/apx-publish.sh "${args[@]}"
