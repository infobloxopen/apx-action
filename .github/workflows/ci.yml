# apx-action's own CI: lint the publish engine and run its bats unit tests.
# Keeps scripts/apx-publish.sh honest independently of the reusable workflow that
# ships it.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install tooling (bats, shellcheck, yq)
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y bats shellcheck
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version; jq --version; bats --version; shellcheck --version | head -2

      - name: ShellCheck
        run: shellcheck --severity=warning scripts/apx-publish.sh tests/stubs/*

      - name: Bats tests
        run: bats --print-output-on-failure tests/
