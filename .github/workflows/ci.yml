# CI for the apx-action repo itself: lint the publish engine's helper scripts and
# run their unit tests. (The reusable apx-publish.yml is exercised end to end by
# consuming repos; this guards the shell logic that ships in the toolchain.)
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install bats + yq
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y bats
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version; jq --version; bats --version; shellcheck --version | head -2

      - name: shellcheck (publish engine + helpers)
        run: shellcheck scripts/supersede.sh tests/supersede_test.sh

      - name: supersede unit test (CICD-1378)
        run: bash tests/supersede_test.sh

      - name: shellcheck (apx-publish engine + test stubs)
        run: shellcheck --severity=warning scripts/apx-publish.sh tests/stubs/*

      - name: bats unit tests (apx-publish engine)
        run: bats --print-output-on-failure tests/
